{% extends 'base.html' %}
{% load static %}

{% block content %}



<!-- ========== Main content starts ========== -->
<main">

     <!-- Hero / banner -->
     <section class="section-intro padding-y-sm bg-opacity-25 bg-warning"
          aria-label="Featured promotion">
          <div class="container">
               <figure class="intro-banner-wrap mb-0 mt-5 d-none d-md-block">
                    <img src="{% static 'images/banners/1.webp' %}"
                         class="img-fluid w-100 rounded "
                         alt="Featured promotion banner">
               </figure>
          </div>
     </section>

     <!-- Popular products -->
     <section class="section-name padding-y-sm bg-opacity-25 bg-warning "
          aria-labelledby="popular-products-title">
          <div class="container">

               <header class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                    <h2 id="popular-products-title"
                         class="section-title h3 mb-0">Popular products</h2>
                    <a href="{% url 'store' %}"
                         class="btn btn-secondary">Store Dashboard</a>
               </header>

               <section aria-label="Product list">
                    <div class="row g-3">

                         {% for product in products %}
                        
                         <!-- products card here -->
                         <article class="col-12 col-md-4 col-lg-3">
                              <div class="card card-product-grid h-100">
                                   <a href="./product-detail.html"
                                        class="img-wrap">
                                        <img src="{{ product.images.url }}"
                                             class="card-img-top d-block mx-auto"
                                             alt="Product 1">
                                   </a>
                                   <div class="card-body info-wrap">
                                        <h5 class="mb-1">
                                             <a href="./product-detail.html"
                                                  class="title text-decoration-none text-center">{{ product.product_name}}</a>
                                        </h5>

                                        <div class="mt-auto ">
                                             <p class="mb-2 fw-bold text-center">£ {{ product.price }}</p>
                                             <a href="#"
                                                  class="price btn btn-warning w-100">Add to cart</a>
                                        </div>
                                   </div>

                              </div>
                         </article>
                         <!-- products card here -->

                         {% endfor %}


                    </div>
               </section>

          </div>
     </section>

     </main>

     {% endblock content %}
